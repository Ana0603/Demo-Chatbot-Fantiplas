<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat Fantiplas</title>

<style>
body { background:#f0f2f5; font-family: 'Segoe UI'; }

#chat-wrapper {
  width:380px; height:600px; margin:40px auto;
  background:#fff; border-radius:20px;
  display:flex; flex-direction:column;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

#chat-header {
  background:#89AF29; color:white;
  padding:15px; font-weight:bold;
}

#chat {
  flex:1; padding:15px;
  overflow-y:auto;
  display:flex; flex-direction:column;
}

.message {
  max-width:75%;
  padding:10px 14px;
  margin:6px 0;
  border-radius:18px;
}

.bot { background:#e4e6eb; align-self:flex-start; }
.user { background:#89AF29; color:white; align-self:flex-end; }

.options {
  display:flex; flex-wrap:wrap; gap:5px; margin:5px 0;
}

.option-btn {
  background:#f1f1f1;
  border:none;
  padding:6px 10px;
  border-radius:15px;
  cursor:pointer;
}

#input-area {
  display:flex;
  border-top:1px solid #ddd;
  padding:10px;
}

#userInput {
  flex:1;
  border:none;
  padding:10px;
  border-radius:20px;
  background:#f1f1f1;
}

button.send {
  margin-left:10px;
  background:#89AF29;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:20px;
}

  #chat-toggle {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #89AF29;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  z-index: 999;
}

/* CHAT FLOTANTE */
#chat-wrapper {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  width: 380px;
  height: 600px;
  background: #fff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 998;
}

/* OCULTO */
.hidden {
  display: none;
}
</style>
</head>

<body>
<!-- BOTÓN -->
<div id="chat-toggle">💬</div>

<!-- CHAT -->
<div id="chat-wrapper" class="hidden">
  <div id="chat-header">FantiBot</div>
  <div id="chat"></div>

  <div id="input-area">
    <input id="userInput" placeholder="Escribe...">
    <button class="send" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
let step = 0;
let data = {};

const chat = document.getElementById("chat");

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "message " + type;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addOptions(options) {
  const container = document.createElement("div");
  container.className = "options";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerText = opt;
    btn.onclick = () => handleResponse(opt);
    container.appendChild(btn);
  });

  chat.appendChild(container);
}

function bot(text, options=[]) {
  setTimeout(() => {
    addMessage(text, "bot");
    if(options.length) addOptions(options);
  }, 400);
}

function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, "user");
  input.value = "";
  handleResponse(text);
}

function handleResponse(msg) {

switch(step) {

  // 1. APERTURA
  case 0:
    step = 1;
    bot("¿Compras para empresa o uso personal?",
        ["Empresa", "Uso personal"]);
    break;

  // 2. CALIFICACIÓN
  case 1:
    data.tipoCliente = msg.trim();
    step = 2;
    bot("¿Qué tipo de producto necesitas?",
        ["Envases alimentos", "Cuidado personal", "Hogar"]);
    break;

  case 2:
    data.tipoProducto = msg.trim();
    step = 3;
    bot("¿Volumen estimado?",
        ["<1.000", "1.000 - 10.000", ">10.000"]);
    break;

  // 3. NECESIDAD
  case 3:
    data.volumen = msg.trim();
    step = 4;
    bot("¿Qué producto vas a envasar?");
    break;

  case 4:
    data.producto = msg.trim();
    step = 5;
    bot("Capacidad aproximada (ml o gramos)?");
    break;

  case 5:
    data.capacidad = msg.trim();
    step = 6;
    bot("¿Material? (PET, PEAD, PP...)");
    break;

  case 6:
    data.material = msg.trim();
    step = 7;
    bot("¿Necesitas molde nuevo o ya lo tienes?",
        ["Nuevo", "Ya tengo"]);
    break;

  case 7:
    data.molde = msg.trim();
    step = 8;
    bot("¿Color o transparente?",
        ["Color", "Transparente"]);
    break;

  // 4. INTENCIÓN
  case 8:
    data.color = msg.trim();
    step = 9;
    bot("¿Para cuándo lo necesitas?",
        ["Urgente", "1-3 meses", "Cotizando"]);
    break;

  case 9:
    data.tiempo = msg.trim();
    step = 10;
    bot("¿Estás cotizando con otros proveedores?",
        ["Sí", "No"]);
    break;

  case 10:
    data.comparando = msg.trim();
    step = 11;
    bot("Perfecto 🙌 Ahora tus datos. ¿Nombre?");
    break;

  // 5. LEAD
  case 11:
    data.nombre = msg.trim();
    step = 12;
    bot("Empresa?");
    break;

  case 12:
    data.empresa = msg.trim();
    step = 13;
    bot("Correo?");
    break;

  case 13:
  if (!msg.includes("@")) {
    bot("⚠️ Por favor ingresa un correo válido (ej: nombre@empresa.com)");
    return;
  }

  data.email = msg.trim();
  step = 14;
  bot("Teléfono?");
  break;

  case 14:
  data.telefono = msg.trim();
  step = 15;

  bot("Gracias 🚀 Un asesor te contactará hoy mismo.");

  console.log("LEAD FINAL:", data);

  fetch("https://hook.us2.make.com/hvl1sunf2xk4tq4mbkiwwvnndgk0s77q", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  break;

  bot("Gracias 🚀 Un asesor te contactará hoy mismo.");

  console.log("LEAD FINAL:", data);

  fetch("https://hook.us2.make.com/hvl1sunf2xk4tq4mbkiwwvnndgk0s77q", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  break;
}
}

// Inicio
bot("Hola 👋 Soy el asistente de Fantiplas.");
bot("Te ayudo a cotizar envases y productos plásticos.");
bot("¿Qué necesitas hoy?",
    ["Cotizar envases", "Productos hogar", "Hablar con asesor"]
);
  
</script>

<script>
const toggleBtn = document.getElementById("chat-toggle");
const chatWrapper = document.getElementById("chat-wrapper");
toggleBtn.onclick = () => {
  chatWrapper.classList.toggle("hidden");
  if (chatWrapper.classList.contains("hidden")) {
    toggleBtn.innerText = "💬";
  } else {
    toggleBtn.innerText = "✖";
  }
};
</script>
