<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat Fantiplas</title>

<style>
body { background:#f0f2f5; font-family: 'Segoe UI'; }

/* BOTÓN */
#chat-toggle {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #89AF29;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  z-index: 999;
}

/* BURBUJA */
#chat-bubble {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 10px 15px;
  border-radius: 20px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.15);
  z-index: 997;
  opacity: 0;
  transition: all 0.3s ease;
}

#chat-bubble.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#chat-bubble.hide {
  opacity: 0;
  transform: translateX(-50%) translateY(10px);
}

/* CHAT */
#chat-wrapper {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: 380px;
  height: 600px;
  background: #fff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 998;
  opacity: 0;
  transition: all 0.3s ease;
}

#chat-wrapper.active {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#chat-wrapper.hidden {
  display: none;
}

/* HEADER */
#chat-header {
  background:#89AF29;
  color:white;
  padding:10px 15px;
  font-weight:bold;
}

.header-chat {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  width:35px;
  height:35px;
  border-radius:50%;
}

/* CHAT BODY */
#chat {
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.message {
  max-width:75%;
  padding:10px 14px;
  margin:6px 0;
  border-radius:18px;
}

.bot { background:#e4e6eb; align-self:flex-start; }
.user { background:#89AF29; color:white; align-self:flex-end; }

/* OPCIONES */
.options {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin:5px 0;
}

.option-btn {
  background:#f1f1f1;
  border:none;
  padding:6px 10px;
  border-radius:15px;
  cursor:pointer;
  transition: all 0.2s ease;
}

.option-btn.selected {
  background:#89AF29;
  color:white;
}

.option-btn.disabled {
  opacity:0.5;
  pointer-events:none;
}

/* INPUT */
#input-area {
  display:flex;
  border-top:1px solid #ddd;
  padding:10px;
}

#userInput {
  flex:1;
  border:none;
  padding:10px;
  border-radius:20px;
  background:#f1f1f1;
}

button.send {
  margin-left:10px;
  background:#89AF29;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* TYPING */
.typing {
  letter-spacing:3px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity:0.3; }
  50% { opacity:1; }
  100% { opacity:0.3; }
}
</style>
</head>

<body>

<!-- BOTÓN -->
<div id="chat-toggle">🤖</div>
<div id="chat-bubble">👋 Hola, soy el asistente de Fantiplas</div>

<!-- CHAT -->
<div id="chat-wrapper" class="hidden">
  <div id="chat-header">
    <div class="header-chat">
      <img src="logo-fantiplas.jpg" class="logo">
      <span>FantiBot</span>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="userInput" placeholder="Escribe...">
    <button class="send" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
let step = 0;
let data = {};

const chat = document.getElementById("chat");

/* MENSAJES */
function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "message " + type;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

/* OPCIONES */
function addOptions(options) {
  const container = document.createElement("div");
  container.className = "options";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerText = opt;

    btn.onclick = () => {
      btn.classList.add("selected");
      container.querySelectorAll(".option-btn").forEach(b => b.classList.add("disabled"));
      handleResponse(opt);
    };

    container.appendChild(btn);
  });

  chat.appendChild(container);
}

/* TYPING */
function typingIndicator() {
  const typing = document.createElement("div");
  typing.className = "message bot typing";
  typing.innerHTML = "•••";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
  return typing;
}

/* BOT */
function bot(text, options = []) {
  const typing = typingIndicator();
  const delay = Math.random() * 1000 + 800;

  setTimeout(() => {
    typing.remove();
    addMessage(text, "bot");
    if (options.length) addOptions(options);
  }, delay);
}

/* ENVIAR */
function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, "user");
  input.value = "";
  handleResponse(text);
}

/* ENTER */
document.getElementById("userInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

/* FLUJO */
function handleResponse(msg) {

switch(step) {

case 0:

  if (msg === "Cotizar envases") {
    step = 1;
    bot("¿Compras para empresa o uso personal?",
      ["Empresa", "Uso personal"]);
  }

  else if (msg === "Consultas de productos") {
    step = 300;
    bot("Cuéntame qué producto buscas o qué duda tienes 😊");
}

  else if (msg === "Contactar con un asesor") {
    step = 200;
    bot("Muy pronto podrás contactar directamente con un asesor 😊");
  }

  else {
  bot(
    "Para poder ayudarte mejor 😊 por favor selecciona una opción:",
    [
      "Cotizar envases",
      "Consultas de productos",
      "Contactar con un asesor"
    ]
  );
}

  break;

case 1:
  data.tipoCliente = msg.trim();

  if (data.tipoCliente === "Uso personal") {

    bot("Gracias por escribirnos 😊");

    setTimeout(() => {
      bot("Actualmente trabajamos únicamente con ventas empresariales y pedidos por volumen, por lo que no manejamos ventas por unidad.");
    }, 1200);

    setTimeout(() => {
      bot(
        "Si representas una empresa o seleccionaste la opción incorrecta, puedes continuar aquí:",
        ["Soy empresa", "Hablar con asesor"]
      );
    }, 2400);

    step = 100;
    break;
  }

  step = 2;
  bot("¿Qué tipo de producto necesitas?",
      ["Envases alimentos", "Cuidado personal", "Hogar"]);
  break;

  case 100:

  if (msg === "Soy empresa") {
    step = 2;
    bot("Perfecto 🙌 ¿Qué tipo de producto necesitas?",
        ["Envases alimentos", "Cuidado personal", "Hogar"]);
  }

  if (msg === "Hablar con asesor") {
    bot("Claro 😊 Un asesor se pondrá en contacto contigo pronto.");
    step = 999;
  }

  break;

case 2:
  data.tipoProducto = msg;
  step = 3;
  bot("Para tener una idea 😊 ¿Qué cantidad estás pensando manejar?",["Menos de 1.000 unidades","1.000 a 10.000","Más de 10.000"]);
  break;

case 3:
  data.volumen = msg;
  step = 4;
  bot("Cuéntame un poco más 👇 ¿Qué producto quieres envasar?");
  break;

case 4:
  data.producto = msg;
  step = 5;
  bot("¿Qué capacidad estás buscando? (aproximada)");
  break;

case 5:
  data.capacidad = msg;
  step = 6;
  bot("¿Hay algún material que prefieras o necesitas recomendación?");
  break;

case 6:
  data.material = msg;
  step = 7;
  bot("¿Ya cuentas con un molde o necesitas desarrollarlo?",["Ya tengo","Necesito crear uno"]);
  break;

case 7:
  data.molde = msg;
  step = 8;
  bot("Entendido 👍 ¿Lo necesitas transparente o en algún color específico?",["Transparente","Color"]);
  break;

case 8:
  data.color = msg;
  step = 9;
  bot("¿En qué plazo te gustaría recibirlo?",["Urgente","1 a 3 meses","Solo estoy cotizando"]);
  break;

case 9:
  data.tiempo = msg;
  step = 10;
  bot("Última pregunta 👀 ¿Has cotizado con otros proveedores?",["Sí","No"]);
  break;

case 10:
  data.comparando = msg;
  step = 11;
  bot("Perfecto 🙌 Para finalizar, ¿me compartes tu nombre?");
  break;

case 11:
  data.nombre = msg;
  step = 12;
  bot("¿Para qué empresa trabajas?");
  break;

  case "Preguntas sobre productos":
  step = 100;
  bot("Cuéntame qué producto estás buscando o qué duda tienes 😊");
  break;

case 300:
  const texto = msg.toLowerCase();

  let respondido = false;

  const quiereCotizar = palabrasCotizacion.some(p =>
  texto.includes(p)
);

if (quiereCotizar) {
  bot("Parece que buscas una cotización 😊 vamos a ayudarte.");

  setTimeout(() => {
    step = 1;
    bot("¿Compras para empresa o uso personal?",
      ["Empresa", "Uso personal"]);
  }, 1000);

  break;
}

const preguntasPrecio = [
  "precio",
  "valor",
  "costo",
  "cuanto vale",
  "cuánto vale",
  "cuanto cuesta",
  "cuánto cuesta"
];

const preguntaPrecio = preguntasPrecio.some(p =>
  texto.includes(p)
);

if (preguntaPrecio) {
  step = 600;

  bot(
    "Para calcular el precio de un producto necesitamos analizar factores como molde, material, color, decorado y volumen de producción.\n\nPor eso te recomendamos realizar una cotización para que un asesor revise tu necesidad y pueda darte un precio más preciso 😊",
    [
      "Cotizar productos",
      "Hablar con asesor"
    ]
  );

  break;
}

  for (let clave in respuestasRapidas) {
    if (texto.includes(clave)) {
      bot(respuestasRapidas[clave]);
      respondido = true;
      break;
    }
  }

  if (!respondido) {
    bot("No encontré esa información exacta todavía, pero un asesor puede ayudarte mejor 😊");
  }

  break;

case 12:
  data.empresa = msg;
  step = 13;
  bot("Para que un asesor te contacte directamente, ¿me compartes tu correo?");
  break;

case 13:
  if (!msg.includes("@")) {
    bot("⚠️ Solo para confirmar, ¿me puedes enviar un correo válido?");
    return;
  }
  data.email = msg;
  step = 14;
  bot("Si prefieres contacto por WhatsApp, también puedes dejarme tu número 📱");
  break;

case 14:
  data.telefono = msg;
  step = 500;

  bot("¡Listo! 🚀 Ya recibimos tu solicitud. Un asesor se pondrá en contacto contigo muy pronto.");

  fetch("TU_WEBHOOK", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  setTimeout(() => {
    bot(
      "Mientras tanto 😊 ¿quieres resolver alguna duda adicional?",
      [
        "Consultar productos",
        "Hablar con asesor"
      ]
    );
  }, 1500);

  break;

  case 500:

  if (msg === "Consultar productos") {
    step = 300;
    bot("Perfecto 😊 cuéntame qué producto buscas o qué duda tienes.");
  }

  else if (msg === "Hablar con asesor") {
    step = 999;
    bot("Claro 🙌 Un asesor comercial se pondrá en contacto contigo pronto.");
  }

  else {
    bot(
      "Por favor selecciona una opción 😊",
      [
        "Consultar productos",
        "Hablar con asesor"
      ]
    );
  }

  break;

  case 600:

  if (msg === "Cotizar productos") {
    step = 1;
    bot(
      "Perfecto 🙌 vamos a ayudarte con tu cotización.\n\n¿Compras para empresa o uso personal?",
      ["Empresa", "Uso personal"]
    );
  }

  else if (msg === "Hablar con asesor") {
    step = 999;
    bot("Claro 😊 Un asesor comercial se pondrá en contacto contigo pronto.");
  }

  else {
    bot(
      "Por favor selecciona una opción 😊",
      [
        "Cotizar productos",
        "Hablar con asesor"
      ]
    );
  }

  break;

  
}
}

const palabrasCotizacion = [
  "cotizar",
  "comprar",
  "pedido",
  "proveedor",
  "fabricar",
  "produccion",
  "necesito",
  "quiero",
  "volumen",
  "cantidad",
  "unidades"
];

/* TOGGLE */
const toggleBtn = document.getElementById("chat-toggle");
const chatWrapper = document.getElementById("chat-wrapper");
const bubble = document.getElementById("chat-bubble");

toggleBtn.onclick = () => {

  if (chatWrapper.classList.contains("active")) {
    chatWrapper.classList.remove("active");
    chatWrapper.classList.add("hidden");
    toggleBtn.innerText = "🤖";

    bubble.classList.remove("hide");
    bubble.classList.add("show");

  } else {
    chatWrapper.classList.remove("hidden");
    chatWrapper.classList.add("active");
    toggleBtn.innerText = "✖";

    bubble.classList.remove("show");
    bubble.classList.add("hide");
  }
};

/* BURBUJA AUTO */
setTimeout(() => bubble.classList.add("show"), 1000);
setTimeout(() => bubble.classList.remove("show"), 6000);

/* INICIO */
setTimeout(() => {
  bot("Hola 👋 Soy FantiBot, el asistente de Fantiplas.");

  bot("¿Cómo puedo ayudarte hoy?", [
      "Cotizar envases",
      "Consultas de productos",
      "Contactar con un asesor"
]);

},);

</script>
